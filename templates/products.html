{% extends "base.html" %}

{% block content %}
    <table>
        <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Location</th>
        </tr>

        {% for p in product_list %}
        <tr>
            <td>{{ p.name }}</td>
            <td>{{ p.price }}</td>
            <td>{{ p.location }}</td>
        </tr>
        {% endfor %}
    </table>
{% endblock %}
